# rag-frontend/nginx.conf
#
# In Docker, the frontend and backend are separate containers.
# Vite's dev proxy (vite.config.js) only works in development.
# In production (Docker), nginx handles the proxying instead.
#
# /api/*    → stripped to /* and forwarded to backend:8000
# /images/* → forwarded to backend:8000 (static image files)
# /*        → served from /dist (React SPA)

server {
    listen 80;
    server_name _;

    # React app — all non-API routes
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # SPA fallback: if the file doesn't exist, serve index.html
        # Required for client-side routing (React Router, etc.)
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → backend FastAPI (strip /api prefix)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events) streaming chat
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Increase timeout for long-running requests (large PDF ingest)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy /images/* → backend static files (extracted PDF images)
    location /images/ {
        proxy_pass         http://backend:8000/images/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}